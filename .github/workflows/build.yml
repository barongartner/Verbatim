name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Test
        run: dotnet test Verbatim.sln -c Release

  portable:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Publish
        run: dotnet publish src/Verbatim/Verbatim.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o publish
      - uses: actions/upload-artifact@v4
        with:
          name: Verbatim-portable-win-x64
          path: publish/Verbatim.exe
          retention-days: 30

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Extract version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$v" >> $env:GITHUB_ENV
      - name: Publish
        # -p:Version stamps the binary itself (FileVersion/ProductVersion/About dialog),
        # not just the installer, so the exe self-identifies as the tagged release.
        run: dotnet publish src/Verbatim/Verbatim.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:Version=$env:VERSION -p:IncludeSourceRevisionInInformationalVersion=false -o publish
      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\verbatim.iss "/DAppVersion=$env:VERSION" "/DPublishDir=$env:GITHUB_WORKSPACE\publish"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/Verbatim.exe
            installer/Output/VerbatimSetup-*.exe
          generate_release_notes: true
